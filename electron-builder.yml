appId: com.charlesjasthyn.cj-license-checker
productName: CJSoftware License Checker
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - resources/**/*
  - package.json
asar: true
mac:
  artifactName: "CJSoftware-License-Checker-${arch}.${ext}"
  icon: resources/icon.icns
  identity: null
  target:
    - target: dmg
  category: public.app-category.utilities
win:
  icon: resources/icon.ico
  target:
    - target: nsis
    - target: portable

nsis:
  artifactName: "CJSoftware-License-Checker-Setup.${ext}"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

portable:
  artifactName: "CJSoftware-License-Checker-Portable.${ext}"
  unicode: true

publish:
  - provider: github
    owner: selrahcDC
    repo: cjsoftware-license-checker
