appId: com.charlesjasthyn.cj-license-checker
productName: CJSoftware License Checker
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - resources/**/*
  - package.json
asar: true
mac:
  icon: resources/icon.icns
  identity: null
  target:
    - target: dmg
  category: public.app-category.utilities
win:
  icon: resources/icon.ico
  target:
    - target: nsis
    - target: portable
portable:
  artifactName: "${productName}-Portable-${version}.${ext}"
  unicode: true
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

publish:
  - provider: github
    owner: selrahcDC
    repo: cjsoftware-license-checker
